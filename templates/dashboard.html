<!DOCTYPE html>
<html>
<head>

<title>ThreatSense AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
}

.sidebar{
width:230px;
background:#020617;
height:100vh;
padding:20px;
}

.sidebar h2{
color:#ef4444;
}

.sidebar a{
display:block;
margin:15px 0;
color:#94a3b8;
text-decoration:none;
}

.main{
flex:1;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.camera{
background:black;
height:320px;
border-radius:10px;
overflow:hidden;
}

.camera img{
width:100%;
height:100%;
object-fit:cover;
}

.chart{
background:#1e293b;
padding:20px;
border-radius:10px;
height:250px;
}

.log{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
height:200px;
overflow:auto;
}

button{
padding:10px;
margin-top:10px;
width:100%;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
}

</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

<h2>ThreatSense</h2>

<a href="#">Overview</a>
<a href="#">Cameras</a>
<a href="#">Alerts Log</a>

<hr>

<form action="/upload" method="post" enctype="multipart/form-data">
<input type="file" name="video">
<button type="submit">Upload Video</button>
</form>

<a href="/camera">
<button>Start Camera</button>
</a>

</div>

<!-- Main Content -->
<div class="main">

<h1>Overview</h1>

<div class="cards">

<div class="card">
<h3>Active Cameras</h3>
<p id="cameraCount">1</p>
</div>

<div class="card">
<h3>Active Threats</h3>
<p id="threatCount">0</p>
</div>

<div class="card">
<h3>Incidents Today</h3>
<p id="incidentCount">0</p>
</div>

<div class="card">
<h3>Status</h3>
<p style="color:#22c55e">System Secure</p>
</div>

</div>


<div class="grid">

<div class="camera">
<img src="/video_feed">
</div>


<div class="chart">

<h3>Threat Activity</h3>

<canvas id="threatChart"></canvas>

</div>

</div>


<div class="log">

<h3>Recent Incidents</h3>

<div id="incidentLog"></div>

</div>

</div>


<script>

let ctx=document.getElementById("threatChart").getContext("2d")

let chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[{
label:"Threat Level",
data:[],
borderColor:"#ef4444",
fill:false,
tension:0.3
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
})

async function loadIncidents(){

let response=await fetch("/incidents")
let data=await response.json()

let log=document.getElementById("incidentLog")

log.innerHTML=""

let labels=[]
let scores=[]

data.slice(-10).forEach(e=>{

log.innerHTML+=`<p>${e.Time} - ${e.Event}</p>`

labels.push(e.Time)
scores.push(e.ThreatScore)

})

chart.data.labels=labels
chart.data.datasets[0].data=scores
chart.update()

document.getElementById("incidentCount").innerText=data.length

}

setInterval(loadIncidents,5000)

</script>

</body>
</html>
